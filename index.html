<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Levanta</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="wrapper">
      <main>
        <section class="main">
          <div class="container">
            <div class="main__row">
              <div class="main__col">
                <div class="main__content firstpage">
                  <div class="firstpage__motivation">
                    <p>You Don’t Need</p>
                    <p>More Motivation.</p>
                    <p>You Need Strength.</p>
                  </div>
                  <div class="firstpage__text">
                    <p>
                      The strength to rebuild yourself — one mindset, one habit,
                      one day at a time.
                    </p>
                  </div>
                  <button class="firstpage__button">Play Intro Video</button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>

  <script>
    const burger = document.querySelector(".header__burger");
    const headerList = document.querySelector(".header__list");

    document.querySelector(".header__burger").addEventListener("click", () => {
      headerList.classList.toggle("active");
    });
  </script>
</html>
